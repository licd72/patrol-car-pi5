services:
  # === Foxy 容器: 底盘 + 传感器 ===
  patrol_car:
    image: patrol-robot:foxy
    container_name: patrol_car
    mem_limit: 1024m
    network_mode: host
    privileged: true
    restart: always
    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - ROS_DOMAIN_ID=42
      - TZ=Asia/Shanghai
      - ROBOT_TYPE=x3
    volumes:
      - /home/pi/patrol_robot:/home/pi/patrol_robot
      - /dev:/dev
      - /tmp:/tmp
    devices:
      - /dev/myserial:/dev/myserial
      - /dev/rplidar:/dev/rplidar
      - /dev/video0:/dev/video0
    working_dir: /home/pi/patrol_robot/patrol_robot
    command: bash /home/pi/patrol_robot/scripts/container_init.sh

  # === Humble 容器: SLAM + Nav2 (按需启动) ===
  slam_nav:
    image: patrol-nav2:humble
    container_name: slam_nav
    mem_limit: 1024m
    network_mode: host
    privileged: true
    restart: "no"
    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - ROS_DOMAIN_ID=42
      - TZ=Asia/Shanghai
    volumes:
      - /home/pi/patrol_robot:/home/pi/patrol_robot
      - /dev:/dev
      - /tmp:/tmp
    devices:
      - /dev/myserial:/dev/myserial
      - /dev/rplidar:/dev/rplidar
    working_dir: /home/pi/patrol_robot/patrol_robot
    command: bash /home/pi/patrol_robot/scripts/nav2_init.sh
    profiles:
      - nav
