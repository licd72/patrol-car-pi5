# ==============================================================
# Navigation2 参数 (RPi5 + ROSMASTER X3 优化)
# ==============================================================
# 小心: 单位为米/秒/弧度, 所有值以安全优先

# ── 代价地图公共参数 ──
local_costmap:
  ros__parameters:
    update_frequency: 5.0
    publish_frequency: 2.0
    global_frame: odom
    robot_base_frame: base_link
    rolling_window: true
    width: 3          # 局部窗口 3m×3m
    height: 3
    resolution: 0.05  # 5cm 栅格
    footprint: "[[-0.15, -0.12], [0.35, -0.12], [0.35, 0.12], [-0.15, 0.12]]"  # X3 底盘尺寸
    plugins: ["obstacle_layer", "inflation_layer"]
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.3     # 膨胀半径 30cm
      cost_scaling_factor: 3.0
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      enabled: true
      obstacle_range: 3.0       # 3m 内标记障碍
      raytrace_range: 3.5
      observation_sources: laser
      laser:
        topic: /scan
        max_obstacle_height: 1.5
        clearing: true
        marking: true

global_costmap:
  ros__parameters:
    update_frequency: 1.0
    publish_frequency: 0.5
    global_frame: map
    robot_base_frame: base_link
    resolution: 0.05
    footprint: "[[-0.15, -0.12], [0.35, -0.12], [0.35, 0.12], [-0.15, 0.12]]"
    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"
      map_subscribe_transient_local: true
    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      obstacle_range: 3.0
    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.3

# ── 全局规划器 (A* 算法) ──
planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.3         # 0.3m 路径容差
      use_astar: true        # ✅ A* 算法 (知识库推荐)

# ── 局部控制器 (DWB) ──
controller_server:
  ros__parameters:
    controller_frequency: 10.0
    controller_plugins: ["FollowPath"]
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false

      # --- 速度限制 (安全第一) ---
      max_vel_x: 0.30             # 最大前进 0.3 m/s (≈1 km/h)
      min_vel_x: -0.10            # 最大后退 0.1 m/s
      max_vel_y: 0.0              # Ackerman 无横向移动
      max_vel_theta: 1.0          # 最大转向 1.0 rad/s
      min_speed_xy: 0.0
      max_speed_xy: 0.30

      # --- 加速度限制 (缓启缓停) ---
      acc_lim_x: 0.2
      acc_lim_theta: 0.5
      decel_lim_x: -0.3
      decel_lim_theta: -1.0

      # --- 目标容差 ---
      xy_goal_tolerance: 0.2      # 到达目标 20cm 内即可
      yaw_goal_tolerance: 0.1     # 朝向容差 0.1 rad (≈6°)
      transform_tolerance: 0.2

# ── 行为树 (简化版, 只保留基础行为) ──
behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    default_server_timeout: 20
