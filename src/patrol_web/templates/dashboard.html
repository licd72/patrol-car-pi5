<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>巡逻车监控面板</title>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --text: #e2e8f0;
    --muted: #94a3b8; --accent: #38bdf8; --danger: #ef4444;
    --warning: #f59e0b; --success: #22c55e; --info: #8b5cf6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background:var(--bg);
         color:var(--text); min-height:100vh; padding:20px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:16px; max-width:1400px; margin:0 auto; }
  .card { background:var(--card); border-radius:12px; padding:20px;
          box-shadow:0 1px 3px rgba(0,0,0,.3); }
  .card h3 { color:var(--muted); font-size:13px; text-transform:uppercase;
             letter-spacing:1px; margin-bottom:12px; }
  .card .value { font-size:28px; font-weight:700; }

  /* 状态徽章 */
  .badge { display:inline-block; padding:4px 12px; border-radius:20px;
           font-size:13px; font-weight:600; }
  .badge-ALERTING { background:var(--danger); color:#fff; animation:pulse .8s infinite; }
  .badge-TRACKING { background:var(--warning); color:#000; }
  .badge-SCANNING { background:var(--info); color:#fff; }
  .badge-NAVIGATING { background:var(--accent); color:#000; }
  .badge-IDLE, .badge-OFFLINE { background:var(--muted); color:#000; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

  /* 检测/报警列表 */
  .log { max-height:300px; overflow-y:auto; font-size:13px; }
  .log .item { padding:8px 0; border-bottom:1px solid #334155; }
  .log .time { color:var(--muted); margin-right:8px; }
  .log .tag { display:inline-block; background:var(--danger); color:#fff;
              padding:1px 6px; border-radius:4px; font-size:11px; margin-right:4px; }
  .log .score { color:var(--warning); }

  /* 抓拍网格 */
  .snap-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; }
  .snap-grid img { width:100%; height:80px; object-fit:cover; border-radius:6px; cursor:pointer;
                   border:2px solid transparent; transition:border .2s; }
  .snap-grid img:hover { border-color:var(--accent); }

  /* 响应式 */
  @media(max-width:700px){ .grid{grid-template-columns:1fr;} }

  /* 方向键 */
  .dpad { text-align:center; }
  .dpad-row { display:flex; justify-content:center; gap:8px; margin:4px 0; }
  .ctrl-btn { width:56px; height:56px; border:none; border-radius:12px;
    background:var(--card); color:var(--accent); font-size:24px; cursor:pointer;
    border:2px solid #334155; transition:all .15s; }
  .ctrl-btn:hover { background:var(--accent); color:#000; border-color:var(--accent); }
  .ctrl-btn.stop { color:var(--danger); font-size:18px; }
  .ctrl-btn.stop:hover { background:var(--danger); color:#fff; border-color:var(--danger); }
  .ctrl-btn:active { transform:scale(0.9); }
  .action-btn { padding:8px 20px; border:none; border-radius:8px; font-size:14px;
    cursor:pointer; margin:4px; transition:all .15s; }
  .patrol-start { background:var(--success); color:#000; }
  .patrol-stop { background:var(--danger); color:#fff; }
  .action-btn:hover { opacity:0.85; transform:scale(1.03); }
  .speed-btn { width:32px; height:32px; border:2px solid var(--accent); border-radius:8px;
    background:var(--card); color:var(--accent); font-size:18px; cursor:pointer; }

  /* 路线编辑 */
  .route-edit { font-size:13px; }
  .route-edit input { width:70px; background:#334155; border:1px solid #475569; color:#e2e8f0; border-radius:4px; padding:2px 4px; font-size:12px; margin:1px; }
  .route-edit input.name { width:90px; }
  .route-edit select { background:#334155; border:1px solid #475569; color:#e2e8f0; border-radius:4px; padding:2px; font-size:12px; }
  .route-item { display:flex; align-items:center; gap:4px; padding:4px 0; border-bottom:1px solid #334155; }
  .route-item .idx { color:var(--muted); width:20px; text-align:center; }
  .route-item .idx.active { color:var(--accent); font-weight:bold; }
  .route-item .act { cursor:pointer; color:var(--danger); font-size:11px; }
  .route-btn { padding:4px 12px; border:none; border-radius:6px; font-size:12px; cursor:pointer; margin:2px; }
  .route-btn.add { background:var(--accent); color:#000; }
  .route-btn.save { background:var(--success); color:#000; }
  .route-btn.del { background:var(--danger); color:#fff; }

  .speed-btn:hover { background:var(--accent); color:#000; }
</style>
</head>
<body>

<div class="grid" id="app">

  <!-- 状态卡片 -->
  <div class="card">
    <h3>巡逻状态</h3>
    <div id="state-badge" class="badge badge-OFFLINE">加载中...</div>
    <div style="margin-top:8px;color:var(--muted);font-size:13px;" id="state-since"></div>
  </div>

  <!-- 统计卡片 -->
  <div class="card">
    <h3>运行时长</h3>
    <div class="value" id="uptime">--</div>
    <div style="margin-top:4px;color:var(--muted);font-size:13px;">
      检测 <span id="det-count">0</span> 次 · 报警 <span id="alert-count">0</span> 次
    </div>
  </div>

  <!-- 预置点 -->
  <div class="card">
    <h3>当前位置</h3>
    <div class="value" style="font-size:18px;" id="waypoint-name">—</div>
    <div style="color:var(--muted);font-size:13px;" id="waypoint-detail"></div>
  </div>

  <!-- 实时画面 -->
  <div class="card" style="grid-column:span 2;">
    <h3>📷 实时画面</h3>
    <img src="/video_feed" style="width:100%;max-height:400px;object-fit:contain;border-radius:8px;" 
         onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22240%22><rect fill=%22%231e293b%22 width=%22320%22 height=%22240%22/><text fill=%22%2394a3b8%22 x=%22160%22 y=%22120%22 text-anchor=%22middle%22 font-size=%2214%22>等待画面...</text></svg>'">
  </div>

  <!-- 小车控制 -->
  <div class="card" style="grid-column:span 2;">
    <h3>🗺️ SLAM 地图 <span id="map-info" style="font-size:12px;color:var(--muted);margin-left:10px;">加载中...</span></h3>
    <div id="map-container" style="position:relative; width:100%; height:360px; background:#0f172a; border-radius:8px; overflow:hidden; user-select:none;">
      <canvas id="map-canvas" width="600" height="360" style="width:100%; height:100%; display:block; image-rendering:pixelated;"></canvas>
      <div id="map-status" style="position:absolute; bottom:8px; left:12px; font-size:12px; color:#94a3b8; background:rgba(15,23,42,0.7); padding:4px 8px; border-radius:4px;">
        pose: (0.00, 0.00) 0°
      </div>
      <div style="position:absolute; top:8px; right:12px;">
        <button onclick="mapZoom(1.25)" style="background:#334155;color:#e2e8f0;border:1px solid #475569;padding:2px 8px;border-radius:4px;cursor:pointer;margin-right:4px;">＋</button>
        <button onclick="mapZoom(0.8)" style="background:#334155;color:#e2e8f0;border:1px solid #475569;padding:2px 8px;border-radius:4px;cursor:pointer;">－</button>
        <button onclick="mapFit()" style="background:#334155;color:#e2e8f0;border:1px solid #475569;padding:2px 8px;border-radius:4px;cursor:pointer;margin-left:4px;" title="居中">⊙</button>
      </div>
    </div>
  </div>

  <div class="card" style="grid-column:span 2;">
    <h3>🎮 小车控制 <span id="speed-label" style="font-size:13px;color:var(--accent);margin-left:10px;">0.15 m/s</span></h3>
    <div style="text-align:center;margin-bottom:8px;">
      <button class="speed-btn" onclick="adjSpeed(-0.05)">−</button>
      <span style="margin:0 10px;font-size:14px;">速度</span>
      <button class="speed-btn" onclick="adjSpeed(+0.05)">+</button>
    </div>
    <div class="dpad">
      <button class="ctrl-btn" onmousedown="startMove('forward')" onmouseup="stopMove()" onmouseleave="stopMove()" oncontextmenu="return false" title="前进">▲</button>
      <div class="dpad-row">
        <button class="ctrl-btn" onmousedown="startMove('strafe_left')" onmouseup="stopMove()" onmouseleave="stopMove()" oncontextmenu="return false" title="左移">⬅</button>
        <button class="ctrl-btn stop" onclick="move('stop')" title="停止">■</button>
        <button class="ctrl-btn" onmousedown="startMove('strafe_right')" onmouseup="stopMove()" onmouseleave="stopMove()" oncontextmenu="return false" title="右移">➡</button>
      </div>
      <button class="ctrl-btn" onmousedown="startMove('backward')" onmouseup="stopMove()" onmouseleave="stopMove()" oncontextmenu="return false" title="后退">▼</button>
    </div>
    <div class="dpad" style="margin-top:8px;">
      <div class="dpad-row">
        <button class="ctrl-btn" onmousedown="startMove('left')" onmouseup="stopMove()" onmouseleave="stopMove()" oncontextmenu="return false" title="左转">↺</button>
        <button class="ctrl-btn" onmousedown="startMove('right')" onmouseup="stopMove()" onmouseleave="stopMove()" oncontextmenu="return false" title="右转">↻</button>
      </div>
    </div>
    <div style="margin-top:12px;text-align:center;">
      <button class="action-btn patrol-start" onclick="patrol('start')">▶ 开始巡逻</button>
      <button class="action-btn patrol-stop" onclick="patrol('stop')">⏹ 停止巡逻</button>
    </div>
  </div>

  <!-- 最近检测 -->
  <div class="card" style="grid-column:span 2;">
    <h3>🛡️ 最近检测</h3>
    <div class="log" id="detection-log">
      <div style="color:var(--muted);padding:20px;text-align:center;">暂无检测</div>
    </div>
  </div>

  <!-- 语音命令 -->
  <div class="card">
    <h3>🎤 语音命令</h3>
    <div class="log" id="voice-log">
      <div style="color:var(--muted);padding:20px;text-align:center;">等待命令...</div>
    </div>
  </div>

  <!-- 报警历史 -->
  <div class="card">
    <h3>🚨 报警记录</h3>
    <div class="log" id="alert-log">
      <div style="color:var(--muted);padding:20px;text-align:center;">暂无报警</div>
    </div>
  </div>

  
  <!-- 路线编辑 -->
  <div class="card">
    <h3>🗺️ 巡逻路线编辑</h3>
    <div class="route-edit">
      <select id="route-sel" onchange="loadRoutes()" style="margin-bottom:8px;"></select>
      <div id="route-list"></div>
      <div style="margin-top:8px;">
        <button class="route-btn add" onclick="addWaypoint()">+ 添加点</button>
        <button class="route-btn save" onclick="saveRoutes()">💾 保存</button>
      </div>
    </div>
  </div>

  <!-- 抓拍 -->
  <div class="card">
    <h3>📸 最近抓拍 <span style="font-size:11px;color:var(--muted);">(最近10张)</span>
      <a href="#" onclick="showSnapLog();return false;" style="font-size:12px;color:var(--accent);float:right;">📋 抓拍日志 &gt;</a>
    </h3>
    <div class="snap-grid" id="snapshots">
      <div style="color:var(--muted);font-size:13px;">加载中...</div>
    </div>
  </div>

  <!-- 抓拍日志面板 (默认隐藏) -->
  <div class="card" id="snap-log-panel" style="display:none;">
    <h3>📋 抓拍日志 <a href="#" onclick="hideSnapLog();return false;" style="font-size:12px;color:var(--accent);float:right;">← 返回</a></h3>
    <div style="margin-bottom:8px;">
      <label style="font-size:12px;color:var(--muted);">日期筛选:</label>
      <select id="log-date-sel" onchange="loadSnapLog(1)" style="background:#334155;color:#e2e8f0;border:1px solid #475569;padding:2px 6px;border-radius:4px;font-size:12px;">
        <option value="">全部</option>
      </select>
      <span id="log-info" style="font-size:11px;color:var(--muted);margin-left:8px;"></span>
      <button onclick="deleteAllSnaps()" style="margin-left:12px;background:#ef4444;color:#fff;border:none;padding:2px 10px;border-radius:4px;font-size:11px;cursor:pointer;">全部删除</button>
    </div>
    <div id="log-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;"></div>
    <div style="margin-top:8px;text-align:center;font-size:12px;">
      <button onclick="loadSnapLog(currentLogPage-1)" id="log-prev" style="background:#334155;color:#e2e8f0;border:1px solid #475569;padding:4px 12px;border-radius:4px;cursor:pointer;">上一页</button>
      <span id="log-page" style="margin:0 10px;color:var(--muted);">1/1</span>
      <button onclick="loadSnapLog(currentLogPage+1)" id="log-next" style="background:#334155;color:#e2e8f0;border:1px solid #475569;padding:4px 12px;border-radius:4px;cursor:pointer;">下一页</button>
    </div>
  </div>

</div>

<script>
// ── 自动刷新 ──
const API = '/api';
let INTERVAL = 2000;

// ═══════════════════════════════════════════════
//  SLAM 地图渲染 (双层: map bitmap + pose overlay)
// ═══════════════════════════════════════════════
let _mapMeta = null;
let _mapImg = null;   // Image() 对象
let _mapImgReady = false;
let _mapView = { scale: 1.0, offsetX: 0, offsetY: 0, autoFit: true };

async function updateMapMeta() {
  try {
    const r = await fetch('/api/map/meta');
    const j = await r.json();
    if (!j.ok) {
      document.getElementById('map-info').textContent = '等待 SLAM 首图...';
      return;
    }
    _mapMeta = j;
    document.getElementById('map-info').textContent =
      `${j.width}×${j.height} @ ${j.resolution.toFixed(2)}m/pix, 原点(${j.origin_x.toFixed(1)}, ${j.origin_y.toFixed(1)})`;
    reloadMapImage();
  } catch(e) { console.warn('map meta:', e); }
}

function reloadMapImage() {
  const img = new Image();
  img.onload = () => { _mapImg = img; _mapImgReady = true; drawMapFrame(); };
  img.src = '/api/map.png?t=' + Date.now();
}

// pose overlay: 每 200ms 拉一次
async function updatePose() {
  try {
    const p = await fetch('/api/pose').then(r=>r.json());
    _lastPose = p;
    document.getElementById('map-status').textContent =
      `pose: (${p.x.toFixed(2)}, ${p.y.toFixed(2)}) ${(p.theta * 180 / Math.PI).toFixed(0)}°`;
    drawMapFrame();
  } catch(e) {}
}
let _lastPose = { x: 0, y: 0, theta: 0 };

function worldToPixel(wx, wy) {
  // 世界 (m) → 地图像素 (行/列, top-left origin)
  if (!_mapMeta) return {u: 0, v: 0};
  const col = (wx - _mapMeta.origin_x) / _mapMeta.resolution;
  const row = _mapMeta.height - (wy - _mapMeta.origin_y) / _mapMeta.resolution;
  return { u: col, v: row };
}

function mapFit() {
  if (!_mapMeta) return;
  const cvs = document.getElementById('map-canvas');
  const sx = cvs.width / _mapMeta.width;
  const sy = cvs.height / _mapMeta.height;
  _mapView.scale = Math.min(sx, sy) * 0.95;
  _mapView.offsetX = (cvs.width - _mapMeta.width * _mapView.scale) / 2;
  _mapView.offsetY = (cvs.height - _mapMeta.height * _mapView.scale) / 2;
  _mapView.autoFit = true;
  drawMapFrame();
}
function mapZoom(k) {
  _mapView.autoFit = false;
  const cvs = document.getElementById('map-canvas');
  // 以画布中心为缩放中心
  const cx = cvs.width / 2, cy = cvs.height / 2;
  _mapView.offsetX = cx - (cx - _mapView.offsetX) * k;
  _mapView.offsetY = cy - (cy - _mapView.offsetY) * k;
  _mapView.scale *= k;
  drawMapFrame();
}

function drawMapFrame() {
  const cvs = document.getElementById('map-canvas');
  const ctx = cvs.getContext('2d');
  ctx.fillStyle = '#0f172a';
  ctx.fillRect(0, 0, cvs.width, cvs.height);
  if (!_mapImgReady || !_mapMeta) return;
  if (_mapView.autoFit) mapFit();

  // 画地图 (禁用抗锯齿保持像素清晰)
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(_mapImg,
    _mapView.offsetX, _mapView.offsetY,
    _mapMeta.width * _mapView.scale,
    _mapMeta.height * _mapView.scale
  );

  // 画 pose 箭头
  const p = _lastPose;
  const { u, v } = worldToPixel(p.x, p.y);
  const px = _mapView.offsetX + u * _mapView.scale;
  const py = _mapView.offsetY + v * _mapView.scale;
  const armLen = 14;
  const ang = -p.theta;  // 图像 y 轴向下, theta 反向
  const tx = px + Math.cos(ang) * armLen;
  const ty = py + Math.sin(ang) * armLen;

  // 圆点
  ctx.fillStyle = '#22c55e';
  ctx.strokeStyle = '#052e16';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(px, py, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  // 朝向箭头
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(tx, ty);
  ctx.stroke();
}

// 每 2 秒刷新地图, 每 200ms 刷新 pose
setInterval(updateMapMeta, 2000);
setInterval(updatePose, 200);
window.addEventListener('load', () => { updateMapMeta(); });

async function refresh() {
  try {
    const [state, alerts, snaps, voices] = await Promise.all([
      fetch(API+'/state').then(r=>r.json()),
      fetch(API+'/alerts').then(r=>r.json()),
      fetch(API+'/snapshots').then(r=>r.json()),
      fetch(API+'/voice_cmds').then(r=>r.json()),
    ]);

    renderState(state);
    renderAlerts(alerts);
    renderVoice(voices);
    renderSnapshots(snaps);

    // 报警状态时加速刷新
    INTERVAL = state.state === 'ALERTING' ? 1000 : 2000;
  } catch(e) {
    console.warn('API error:', e);
  }
}

// ── 渲染状态 ──
function renderState(s) {
  const b = document.getElementById('state-badge');
  b.textContent = s.state;
  b.className = 'badge badge-' + s.state;

  document.getElementById('state-since').textContent = '更新: ' + (s.state_since || '—');
  document.getElementById('det-count').textContent = s.total_detections;
  document.getElementById('alert-count').textContent = s.total_alerts;

  const mins = Math.floor(s.uptime_seconds / 60);
  const secs = s.uptime_seconds % 60;
  document.getElementById('uptime').textContent =
    `${Math.floor(mins/60)}h ${mins%60}m ${secs}s`;

  const wp = s.waypoint || {};
  document.getElementById('waypoint-name').textContent = wp.name || '—';
  document.getElementById('waypoint-detail').textContent =
    wp.name ? `${wp.completed}/${wp.total} 点` : '';
}

// ── 渲染语音命令 ──
function renderVoice(cmds) {
  const el = document.getElementById('voice-log');
  if (!cmds.length) {
    el.innerHTML = '<div style="color:var(--muted);padding:20px;text-align:center;">等待命令...</div>';
    return;
  }
  el.innerHTML = cmds.slice(0,10).map(c =>
    `<div class="item"><span class="time">${c.time}</span> 🎤 ${c.cmd}</div>`
  ).join('');
}

// ── 渲染报警 ──
function renderAlerts(alerts) {
  const el = document.getElementById('alert-log');
  if (!alerts.length) {
    el.innerHTML = '<div style="color:var(--muted);padding:20px;text-align:center;">暂无报警 ✅</div>';
    return;
  }
  el.innerHTML = alerts.map(a =>
    `<div class="item">
      <span class="time">${a.time}</span>
      <span class="tag">🚨</span> ${a.message.substring(0,60)}
    </div>`
  ).join('');
}

// ── 渲染抓拍 ──
let seen_snaps = new Set();
function renderSnapshots(snaps) {
  const el = document.getElementById('snapshots');
  if (!snaps.length) {
    el.innerHTML = '<div style="color:var(--muted);font-size:13px;">暂无抓拍</div>';
    return;
  }
  // 只渲染新的
  el.innerHTML = snaps.map(s => {
    seen_snaps.add(s.filename);
    return `<img src="/snapshots/${s.filename}" alt="${s.time}" title="${s.time} (${s.size_kb}KB)" loading="lazy">`;
  }).join('');
}

// ── 抓拍日志 ──
let currentLogPage = 1;
async function loadSnapLog(page) {
  const date = document.getElementById('log-date-sel').value;
  const r = await fetch('/api/snapshots/log?page=' + page + '&per_page=30&date=' + date);
  const data = await r.json();
  currentLogPage = data.page;
  const sel = document.getElementById('log-date-sel');
  if (sel.options.length <= 1) {
    data.dates.forEach(function(d) {
      var opt = document.createElement('option');
      opt.value = d; opt.textContent = d.slice(0,4) + '-' + d.slice(4,6) + '-' + d.slice(6,8);
      sel.appendChild(opt);
    });
  }
  var grid = document.getElementById('log-grid');
  if (!data.files.length) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:13px;">暂无记录</div>';
  } else {
    grid.innerHTML = data.files.map(function(f) {
      return '<div style="text-align:center;position:relative;"><img src="/snapshots/' + f.filename + '" style="width:100%;height:70px;object-fit:cover;border-radius:4px;cursor:pointer;" onclick="window.open(\'/snapshots/' + f.filename + '\')" title="' + f.time + '" loading="lazy"><span onclick="event.stopPropagation();delSnapshot(\'' + f.filename + '\');" style="position:absolute;top:2px;right:2px;background:rgba(239,68,68,0.8);color:#fff;font-size:10px;padding:1px 4px;border-radius:3px;cursor:pointer;" title="删除">X</span><div style="font-size:10px;color:var(--muted);">' + f.time.slice(11,19) + '</div></div>';
    }).join('');
  }
  document.getElementById('log-page').textContent = data.page + '/' + data.pages;
  document.getElementById('log-info').textContent = '共 ' + data.total + ' 张';
  document.getElementById('log-prev').disabled = page <= 1;
  document.getElementById('log-next').disabled = page >= data.pages;
}
function showSnapLog() {
  document.getElementById('snap-log-panel').style.display = '';
  loadSnapLog(1);
}
function hideSnapLog() {
  document.getElementById('snap-log-panel').style.display = 'none';
}
async function deleteAllSnaps() {
  var date = document.getElementById('log-date-sel').value;
  var msg = date ? '删除 ' + date + ' 的所有抓拍?' : '删除全部抓拍?';
  if (!confirm(msg)) return;
  if (!confirm('再次确认: 不可恢复!')) return;
  var r = await fetch('/api/snapshots/delete_all', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({date: date})
  });
  var d = await r.json();
  alert('已删除 ' + d.deleted + ' 张');
  loadSnapLog(1);
}
async function delSnapshot(filename) {
  if (!confirm('删除 ' + filename + ' ?')) return;
  await fetch('/api/snapshots/' + filename, { method: 'DELETE' });
  loadSnapLog(currentLogPage);
}

// ── 小车控制 ──
let _speed = 0.15;

// 按住持续发送，松开停止
let _moveTimer = null;
let _activeDir = null;

function startMove(dir) {
  _activeDir = dir;
  // 立即发一次
  sendMove(dir);
  // 每200ms持续发送，保持运动
  _moveTimer = setInterval(() => sendMove(dir), 200);
}

function stopMove() {
  if (_moveTimer) { clearInterval(_moveTimer); _moveTimer = null; }
  if (_activeDir) { sendMove('stop'); _activeDir = null; }
}

async function sendMove(dir) {
  try {
    const dur = dir === 'stop' ? 0.1 : 0.3;
    const r = await fetch('/api/control/move', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({direction: dir, duration: dur, speed: _speed})
    });
  } catch(e) {}
}

function move(dir) {
  // 兼容停止按钮的 onclick 调用
  sendMove(dir);
}

async function adjSpeed(delta) {
  try {
    const r = await fetch('/api/control/speed', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({delta: delta})
    });
    const data = await r.json();
    _speed = data.speed;
    document.getElementById('speed-label').textContent = _speed + ' m/s';
  } catch(e) { console.warn('speed error:', e); }
}

async function patrol(action) {
  try {
    const r = await fetch('/api/control/patrol', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({action: action})
    });
    console.log('patrol:', action, await r.json());
  } catch(e) { console.warn('patrol error:', e); }
}

// ── 启动 ──

// ── 路线编辑 ──
let routeData = null;
async function loadRoutes() {
  try {
    const r = await fetch('/api/routes');
    routeData = await r.json();
    const sel = document.getElementById('route-sel');
    const routes = routeData.routes || {};
    sel.innerHTML = Object.keys(routes).map(k => `<option value="${k}">${k}</option>`).join('');
    renderWaypoints();
  } catch(e) { console.warn('loadRoutes:', e); }
}
function renderWaypoints() {
  const sel = document.getElementById('route-sel');
  const routeName = sel.value;
  const wps = (routeData?.routes?.[routeName]?.waypoints) || [];
  const list = document.getElementById('route-list');
  list.innerHTML = wps.map((wp, i) => `
    <div class="route-item">
      <span class="idx">${i}</span>
      <input class="name" value="${wp.name||''}" onchange="updateWP(${i},'name',this.value)">
      <input value="${wp.x}" onchange="updateWP(${i},'x',this.value)" title="x(m)"> 
      <input value="${wp.y}" onchange="updateWP(${i},'y',this.value)" title="y(m)">
      <input value="${wp.yaw}" onchange="updateWP(${i},'yaw',this.value)" title="yaw(rad)">
      <input value="${wp.dwell||3}" onchange="updateWP(${i},'dwell',this.value)" title="停留(s)" style="width:40px">
      <span class="act" onclick="delWP(${i})" title="删除">✕</span>
    </div>
  `).join('');
}
function updateWP(idx, field, val) {
  const routeName = document.getElementById('route-sel').value;
  const wps = routeData.routes[routeName].waypoints;
  wps[idx][field] = field==='name'?val:(isNaN(parseFloat(val))?wps[idx][field]:parseFloat(val));
}
async function addWaypoint() {
  const routeName = document.getElementById('route-sel').value;
  await fetch('/api/routes/waypoint', { method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({route:routeName, name:'新点', x:0, y:0, yaw:0, dwell:3}) });
  await loadRoutes();
}
async function delWP(idx) {
  if(!confirm('删除预置点 '+idx+'?')) return;
  const routeName = document.getElementById('route-sel').value;
  await fetch('/api/routes/waypoint/'+idx+'?route='+routeName, { method:'DELETE' });
  await loadRoutes();
}
async function saveRoutes() {
  // 数据已实时保存到YAML, 这里做最终确认
  alert('已保存到 patrol_routes.yaml (修改即时生效)');
}

// ── 启动 ──
loadRoutes();

refresh();
setInterval(refresh, INTERVAL);
</script>
