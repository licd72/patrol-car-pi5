# slam_toolbox online_async 参数 - 实时建图
# RPi5 + YDLIDAR X4 | ROS2 Humble (slam_nav容器)

slam_toolbox:
  ros__parameters:
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    mode: mapping

    # 坐标系
    map_frame: map
    odom_frame: odom
    base_frame: base_footprint
    scan_topic: /scan
    odom_topic: /odom
    use_sim_time: false

    # 地图
    resolution: 0.05
    max_laser_range: 8.0
    map_update_interval: 2.0

    # TF 容忍度 (跨容器DDS延迟大, 需要放宽)
    transform_timeout: 5.0
    transform_tolerance: 5.0
    tf_buffer_duration: 30.0

    # 扫描处理
    minimum_time_interval: 0.5
    throttle_scans: 1

    # 里程计
    use_odometry: true
    use_scan_matching: true
    odom_alpha1: 0.1
    odom_alpha2: 0.1
    odom_alpha3: 0.1
    odom_alpha4: 0.1
    odom_alpha5: 0.1

    # 移动阈值
    travel_delta: 0.2
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.2

    # 发布
    transform_publish_period: 0.05
    publish_map_scan: false

    debug_logging: false
