# slam_toolbox online_async 参数 - 实时建图
# RPi5 + YDLIDAR X4 (10Hz, 128000bps) | ROS2 Foxy

slam_toolbox:
  ros__parameters:
    solver_plugin: solver_plugins::CeresSolver
    mode: mapping

    # 地图
    resolution: 0.05
    max_laser_range: 8.0
    minimum_time_interval: 0.5

    # 坐标系
    map_frame: map
    odom_frame: odom
    base_frame: base_footprint
    scan_topic: /scan
    odom_topic: /odom

    # 里程计
    use_odometry: true
    use_scan_matching: true
    odom_alpha1: 0.1
    odom_alpha2: 0.1
    odom_alpha3: 0.1
    odom_alpha4: 0.1
    odom_alpha5: 0.1

    # 移动阈值
    travel_delta: 0.2
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.2

    # 发布
    transform_publish_period: 0.05
    map_update_interval: 1.0
    publish_map_scan: true
    throttle_scans: 1

    # Ceres 优化器
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT

    debug_logging: false
